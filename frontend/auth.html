</div>
</section>
<!-- Right Side: Authentication Forms (60%) -->
<section class="w-full md:w-[60%] bg-surface-container-lowest flex flex-col items-center justify-center p-md md:p-2xl min-h-screen">
<div class="w-full max-w-md space-y-xl">
<!-- Mobile Logo -->
<div class="md:hidden flex justify-center mb-xl">
<span class="font-display-hero text-headline-md text-primary">Sahayta</span>
</div>
<!-- Form Header -->
<div class="text-center md:text-left space-y-xs">
<h2 class="font-headline-md text-primary-container">Welcome back to Sahayta</h2>
<p class="text-on-surface-variant font-body-sm">Access your personalized learning authority.</p>
</div>
<!-- Toggle Switch -->
<div class="flex justify-center md:justify-start">
<div class="bg-surface-container-low p-xs rounded-full flex items-center w-fit border border-border-soft">
<button class="px-xl py-xs rounded-full font-button-text text-button-text transition-all duration-300 bg-secondary-container text-white shadow-sm" id="toggle-signin" onclick="switchTab('signin')">
                            Sign In
                        </button>
<button class="px-xl py-xs rounded-full font-button-text text-button-text transition-all duration-300 text-on-surface-variant hover:text-primary" id="toggle-signup" onclick="switchTab('signup')">
                            Create Account
                        </button>
</div>
</div>
<!-- Login Form -->
<form class="space-y-lg" id="auth-form">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">EMAIL ADDRESS</label>
<input class="w-full h-[44px] px-md rounded-lg border border-border-soft bg-white text-body-main placeholder:text-outline/50 form-input-focus transition-all" id="email" placeholder="name@institution.edu" type="email"/>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-body-sm text-xs text-secondary hover:text-accent-hover transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full h-[44px] px-md rounded-lg border border-border-soft bg-white text-body-main placeholder:text-outline/50 form-input-focus transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-xs">
<input class="w-4 h-4 rounded border-border-soft text-secondary focus:ring-secondary custom-checkbox transition-all" id="remember" type="checkbox"/>
<label class="font-body-sm text-sm text-on-surface-variant cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full h-[48px] bg-secondary-container text-white font-button-text text-button-text rounded-full hover:bg-accent-hover active:scale-[0.98] transition-all shadow-md" type="submit">
                        Sign In
                    </button>

<div class="flex-grow border-t border-border-soft"></div>
<span class="flex-shrink mx-md font-label-caps text-xs text-outline bg-surface-container-lowest px-xs">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-border-soft"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-xs h-[44px] rounded-full border border-border-soft bg-white hover:bg-surface-container-low transition-colors group">

<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>

<svg class="w-5 h-5" viewbox="0 0 23 23">
<path d="M0 0h23v23H0z" fill="#f3f3f3"></path><path d="M1 1h10v10H1z" fill="#f35325"></path><path d="M12 1h10v10H12z" fill="#81bc06"></path><path d="M1 12h10v10H1z" fill="#05a6f0"></path><path d="M12 12h10v10H12z" fill="#ffba08"></path>
</svg>

</button>

<p class="font-body-sm text-xs text-outline">
                        By continuing, you agree to Sahayta's <a class="underline hover:text-primary" href="#">Terms of Service</a> and <a class="underline hover:text-primary" href="#">Privacy Policy</a>.
                    </p>
</div>
</div>
</section>
</main>
<script>
        function switchTab(type) {
            const btnSignIn = document.getElementById('toggle-signin');
            const btnSignUp = document.getElementById('toggle-signup');
            const headerText = document.querySelector('h2');
            const submitBtn = document.querySelector('form button[type="submit"]');

            if (type === 'signup') {
                btnSignIn.classList.remove('bg-secondary-container', 'text-white', 'shadow-sm');
                btnSignIn.classList.add('text-on-surface-variant');
                btnSignUp.classList.add('bg-secondary-container', 'text-white', 'shadow-sm');
                btnSignUp.classList.remove('text-on-surface-variant');
                headerText.innerText = "Create your Sahayta account";
                submitBtn.innerText = "Create Account";
            } else {
                btnSignUp.classList.remove('bg-secondary-container', 'text-white', 'shadow-sm');
                btnSignUp.classList.add('text-on-surface-variant');
                btnSignIn.classList.add('bg-secondary-container', 'text-white', 'shadow-sm');
                btnSignIn.classList.remove('text-on-surface-variant');
                headerText.innerText = "Welcome back to Sahayta";
                submitBtn.innerText = "Sign In";
            }
        }

        // Lightweight atmospheric effect for the left panel
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.glow-accent');
            if (glow) {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                glow.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(254, 166, 25, 0.12) 0%, transparent 60%)`;
            }
        });
    </script>
