---
- name: Configure LMS Backend Server
  hosts: backend
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - git
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: Install Docker
      apt:
        name: docker-ce
        state: present

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure ubuntu user is added to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker Compose via curl
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: 'u+x,g+x,o+x'

    - name: Create app directory
      file:
        path: /opt/lms-backend
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    # Note: In a real CI/CD pipeline, GitHub actions will copy the latest files using scp/rsync, 
    # but Ansible ensures the target folder and permissions are correct.
